<div
  class="login-container"
  (mousemove)="updateBackgroundPointer($event)"
  [style.--pointer-x]="pointerX + '%'"
  [style.--pointer-y]="pointerY + '%'"
  [style.--shift-x]="pointerShiftX + 'px'"
  [style.--shift-y]="pointerShiftY + 'px'"
  [style.--shift-inverse-x]="pointerShiftInverseX + 'px'"
  [style.--shift-inverse-y]="pointerShiftInverseY + 'px'"
>
  <div class="login-background" aria-hidden="true">
    <div class="grid-layer"></div>
    <div class="cursor-light"></div>
    <div class="scan-line"></div>
    <div class="finance-track track-one"></div>
    <div class="finance-track track-two"></div>
    <div class="finance-track track-three"></div>
    <div class="motion-card motion-card-one">
      <span></span><span></span><span></span>
    </div>
    <div class="motion-card motion-card-two">
      <span></span><span></span><span></span>
    </div>
    <div class="motion-card motion-card-three">
      <span></span><span></span><span></span>
    </div>
    <div class="pulse-node node-one"></div>
    <div class="pulse-node node-two"></div>
    <div class="pulse-node node-three"></div>
  </div>

  <mat-card class="login-card">

    <mat-card-header>
      <mat-card-title class="title">
        <span class="icon">🎬</span>
        Sign In
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" required />
        </mat-form-field>
        <div class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')">
          Email is required.
        </div>
        <div class="error-text" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')">
          Enter a valid email address.
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" required />
        </mat-form-field>
        <div class="error-text" *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')">
          Password is required.
        </div>

        <button
          mat-raised-button
          color="primary"
          class="full-width"
          type="submit"
          [disabled]="loginForm.invalid"
        >
          Login
        </button>
      </form>
    </mat-card-content>

  </mat-card>
</div>
