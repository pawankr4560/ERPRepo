<h2 mat-dialog-title class="dialog-title">Edit User</h2>

<form [formGroup]="form" mat-dialog-content class="dialog-content">
  <div class="form-grid">
    <mat-form-field appearance="outline">
      <mat-label>FirstName</mat-label>
      <input matInput formControlName="firstName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>LastName</mat-label>
      <input matInput formControlName="lastName" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Mobile</mat-label>
      <input matInput formControlName="mobile" inputmode="numeric" maxlength="10" (input)="keepMobileDigits()" />
      <mat-error>Enter 10 digit mobile number.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Address</mat-label>
      <textarea matInput formControlName="address" rows="3"></textarea>
    </mat-form-field>
  </div>
</form>

<mat-dialog-actions align="end" class="dialog-actions">
  <button mat-stroked-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
